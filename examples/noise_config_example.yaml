# Example noise simulation configuration for gwmock_noise (YAML alternative)
# Primary examples use TOML; this file is kept for users who prefer YAML.

detectors:
    - H1
    - L1
duration: 4.0
sampling_frequency: 4096.0
components:
    - simulator: white
    - simulator: spectral_lines
      lines:
          - frequency: 60.0
            amplitude: 1.0e-3
output:
    directory: ./output
    prefix: noise
seed: 42
