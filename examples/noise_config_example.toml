# Example noise simulation configuration for gwmock_noise (TOML)
# Use with: gwmock-noise simulate examples/noise_config_example.toml

detectors = ["H1", "L1"]
duration = 4.0
sampling_frequency = 4096.0

[[components]]
simulator = "white"

[[components]]
simulator = "spectral_lines"
lines = [{ frequency = 60.0, amplitude = 1.0e-3 }]

[output]
directory = "./output"
prefix = "noise"

seed = 42
