name: Release

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: 'Tag name for the release (e.g., v1.2.3)'
                required: true
                type: string
    workflow_call:
        inputs:
            tag_name:
                description: 'Tag name for the release (e.g., v1.2.3)'
                required: true
                type: string

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.tag_name || github.event.inputs.tag_name }}

            - name: Generate changelog
              id: changelog
              uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
              with:
                  config: cliff.toml
                  args: --current --verbose
              env:
                  OUTPUT: CHANGELOG.md

            - name: Delete draft release
              continue-on-error: true
              run: |
                  gh release delete next-release --yes
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Create Release
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
              with:
                  tag_name:
                      ${{ inputs.tag_name || github.event.inputs.tag_name }}
                  body: ${{ steps.changelog.outputs.content }}
                  draft: false
                  prerelease:
                      ${{ contains(inputs.tag_name ||
                      github.event.inputs.tag_name, 'alpha') ||
                      contains(inputs.tag_name || github.event.inputs.tag_name,
                      'beta') }}
