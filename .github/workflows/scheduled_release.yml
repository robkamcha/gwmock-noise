name: Create Tag

on:
    schedule:
        - cron: '0 0 * * 2'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    ci:
        uses: ./.github/workflows/ci.yml

    codeql:
        uses: ./.github/workflows/codeql.yml
        permissions:
            security-events: write
            actions: read
            contents: read

    create_tag:
        needs: [ci, codeql]
        runs-on: ubuntu-latest
        outputs:
            new_tag: ${{ steps.tag_version.outputs.new_tag }}
            has-changes: ${{ steps.check_commits.outputs.has-changes }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Check for new commits
              id: check_commits
              uses: isaac-cf-wong/detect-git-changes-action@fc6c3247a627b517542043b7c8e3aacf9d7a4a9e # v0.0.7

            - name: Bump version and push tag
              if: steps.check_commits.outputs.has-changes == 'true'
              id: tag_version
              uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  release_branches: main
                  default_bump: patch
                  tag_prefix: v

            - name: Output tag information
              if: steps.check_commits.outputs.has-changes == 'true'
              run: |
                  echo "### Tag Created :rocket:" >> $GITHUB_STEP_SUMMARY
                  echo "- **New tag**: ${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Previous tag**: ${{ steps.tag_version.outputs.previous_tag }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Changelog**: ${{ steps.tag_version.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY

    release:
        needs: create_tag
        if: needs.create_tag.outputs.has-changes == 'true'
        uses: ./.github/workflows/release.yml
        permissions:
            contents: write
            id-token: write
        with:
            tag_name: ${{ needs.create_tag.outputs.new_tag }}

    build:
        needs:
            - create_tag
            - release
        if: needs.create_tag.outputs.has-changes == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ needs.create_tag.outputs.new_tag }}
                  fetch-depth: 0

            - name: Output build information
              run: |
                  echo "### Publishing Build :package:" >> $GITHUB_STEP_SUMMARY
                  echo "- **Version tag**: ${{ needs.create_tag.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY

            - name: Install uv
              uses: astral-sh/setup-uv@7
              with:
                  python-version: '3.14.3'
                  enable-cache: 'true'

            - name: Install dependencies
              run: uv sync --frozen

            - name: Build distribution
              run: uv build

            - name: Upload build artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: python-package-distributions
                  path: dist/

    publish-to-pypi:
        needs: build
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write
            attestations: write

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
              with:
                  name: python-package-distributions
                  path: dist/

            - name: Generate attestation
              uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
              with:
                  subject-path: dist/*

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
              with:
                  packages-dir: dist/
